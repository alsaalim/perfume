    const input     = document.getElementById('search-input');
    const form      = document.getElementById('search-form');
    const grid      = document.getElementById('results-grid');
    const header    = document.getElementById('results-header');
    const titleEl   = document.getElementById('results-title');
    const countEl   = document.getElementById('results-count');
    const emptyEl   = document.getElementById('results-empty');
    const emptyMsg  = document.getElementById('empty-msg');
    const promptEl  = document.getElementById('results-prompt');

    function renderResults(query) {
      const q = query.trim().toLowerCase();

      if (!q) {
        header.style.display  = 'none';
        emptyEl.style.display = 'none';
        promptEl.style.display = 'block';
        grid.innerHTML = '';
        return;
      }

      // Score each product: title match gets highest weight, filename match also counts
      const words = q.split(/\s+/).filter(Boolean);
      const scored = PRODUCTS.map(p => {
        const haystack = (p.title + ' ' + p.file).toLowerCase();
        const score = words.filter(w => haystack.includes(w)).length;
        return { ...p, score };
      }).filter(p => p.score > 0)
        .sort((a, b) => b.score - a.score);

      promptEl.style.display = 'none';
      header.style.display   = 'flex';
      titleEl.textContent    = `Search results for "${query.trim()}"`;
      countEl.textContent    = scored.length
        ? scored.length + ' product' + (scored.length > 1 ? 's' : '')
        : '';

      if (scored.length === 0) {
        grid.innerHTML = '';
        emptyEl.style.display = 'block';
        emptyMsg.textContent  = `No products found for "${query.trim()}".`;
        return;
      }

      emptyEl.style.display = 'none';
      grid.innerHTML = scored.map(p => `
        <a class="sr-card" href="${p.file}">
          <div class="sr-card-img">
            <img src="${p.img}" alt="${p.title}" loading="lazy"
                 onerror="this.style.display='none'">
          </div>
          <div class="sr-card-body">
            <p class="sr-card-title">${p.title.split(' | ')[0]}</p>
            <p class="sr-card-price">${p.price}</p>
          </div>
        </a>
      `).join('');
    }

    // Read ?q= from URL on page load
    function getQuery() {
      return new URLSearchParams(window.location.search).get('q') || '';
    }

    function init() {
      const q = getQuery();
      input.value = q;
      renderResults(q);
      document.title = q
        ? `Search: ${q} – AL-SAALIM PERFUMES`
        : 'Search – AL-SAALIM PERFUMES';
    }

    // Live search as user types
    let debounceTimer;
    input.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        const q = input.value;
        const url = new URL(window.location);
        if (q.trim()) { url.searchParams.set('q', q); }
        else { url.searchParams.delete('q'); }
        history.replaceState(null, '', url);
        document.title = q.trim()
          ? `Search: ${q.trim()} – AL-SAALIM PERFUMES`
          : 'Search – AL-SAALIM PERFUMES';
        renderResults(q);
      }, 200);
    });

    // Prevent page reload on form submit (we handle it live)
    form.addEventListener('submit', e => {
      e.preventDefault();
      renderResults(input.value);
    });

    init();
  </script>
</body>
</html>
